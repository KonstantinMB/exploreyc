name: Daily YC Scraper & Email Digests

on:
  schedule:
    # Daily scrape at 2 AM UTC
    - cron: '0 2 * * *'
    # Multi-source sync (Hacker News, ...) at 2:30 AM UTC (after scrape, before pre-warm)
    - cron: '30 2 * * *'
    # Send digests at 10 AM UTC
    - cron: '0 10 * * *'
    # Hero answer-box pre-warm at 3 AM UTC (after scrape, needs Task 12 embeddings)
    - cron: '0 3 * * *'
    # Founder sourcing + enrichment at 4 AM UTC (low-traffic, after scrape/pre-warm)
    - cron: '0 4 * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  daily-scrape:
    runs-on: ubuntu-latest
    # Only run scrape at 2 AM UTC
    if: github.event.schedule == '0 2 * * *' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Scrape YC Companies
        run: |
          curl -X POST "${{ secrets.BACKEND_URL }}/api/cron/daily-scrape" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            -v
        timeout-minutes: 10

  sync-sources:
    runs-on: ubuntu-latest
    # Only run multi-source sync at 2:30 AM UTC (after daily scrape at 2 AM)
    if: github.event.schedule == '30 2 * * *' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Sync non-YC company sources (Hacker News, ...)
        run: |
          curl -X POST "${{ secrets.BACKEND_URL }}/api/cron/sync-sources?sync=1" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            -v
        timeout-minutes: 20

  send-digests:
    runs-on: ubuntu-latest
    # Only run digests at 10 AM UTC
    if: github.event.schedule == '0 10 * * *' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Send Daily Email Digests
        run: |
          curl -X POST "${{ secrets.BACKEND_URL }}/api/cron/send-digests" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            -v
        timeout-minutes: 5

  source-founders:
    runs-on: ubuntu-latest
    # Only run founder sourcing + enrichment at 4 AM UTC (after scrape + pre-warm)
    if: github.event.schedule == '0 4 * * *' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Source founders for a bounded batch of un-sourced YC companies
        run: |
          curl -X POST "${{ secrets.BACKEND_URL }}/api/cron/sync-founders?limit=300" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            -v
        timeout-minutes: 20
      - name: Enrich company funding (no-ops without PERPLEXITY_API_KEY)
        run: |
          curl -X POST "${{ secrets.BACKEND_URL }}/api/cron/enrich-companies" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            -v
        timeout-minutes: 10
      - name: Enrich founders (no-ops without PERPLEXITY_API_KEY)
        run: |
          curl -X POST "${{ secrets.BACKEND_URL }}/api/cron/enrich-founders" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            -v
        timeout-minutes: 10

  # ---------------------------------------------------------------------------
  # Hero answer-box nightly pre-warm (Task 13)
  # Depends on company embeddings being present — Task 12 re-embed must have
  # run at least once before this job produces useful results.
  # WARNING: this job calls gpt-4.1-mini (~40 ideas × ~$0.001 = ~$0.04/night).
  # ---------------------------------------------------------------------------
  prewarm-hero:
    runs-on: ubuntu-latest
    # Only run pre-warm at 3 AM UTC (after daily scrape at 2 AM)
    if: github.event.schedule == '0 3 * * *' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        run: pip install -r backend/requirements.txt

      - name: Pre-warm hero answer cache
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python scripts/prewarm_hero.py
        timeout-minutes: 15
